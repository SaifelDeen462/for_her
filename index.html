<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sajda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@100;200;300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06030a;
            --rose: #c9184a;
            --blush: #ffb3c1;
            --ivory: #f5f0eb;
            --gold: #c9a96e;
            --midnight: #0d0015;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory;
        }

        body {
            background: var(--bg);
            color: var(--ivory);
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
            cursor: none;
        }

        /* ─── Custom Cursor ─── */
        #cursor-dot {
            position: fixed;
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            mix-blend-mode: difference;
        }

        #cursor-ring {
            position: fixed;
            width: 28px;
            height: 28px;
            border: 1px solid rgba(201, 169, 110, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.25s cubic-bezier(0.23, 1, 0.32, 1),
                        width 0.3s ease, height 0.3s ease;
            transform: translate(-50%, -50%);
        }

        /* ─── Fixed Canvas ─── */
        #starfield {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ─── Sections ─── */
        section {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start;
            position: relative;
            overflow: hidden;
        }

        .bg-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
        }

        /* ─── Section 1: Tulip ─── */
        #sec1 .bg-layer {
            background:
                radial-gradient(ellipse 60% 60% at 50% 40%, #1a0028 0%, transparent 70%),
                radial-gradient(ellipse 80% 40% at 50% 90%, #0d0015 0%, transparent 60%);
        }

        /* ─── Section 2: Rose ─── */
        #sec2 .bg-layer {
            background:
                radial-gradient(ellipse 50% 50% at 50% 50%, #1c0010 0%, transparent 70%);
        }

        /* ─── Section 3: Declaration ─── */
        #sec3 .bg-layer {
            background:
                radial-gradient(ellipse 70% 50% at 50% 50%, #0a0020 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 30% 30%, rgba(201,24,74,0.05) 0%, transparent 60%);
        }

        /* ─── Flower Styling ─── */
        .flower-wrap {
            animation: float 7s ease-in-out infinite;
            filter: drop-shadow(0 30px 60px rgba(201, 24, 74, 0.25));
            transform-origin: bottom center;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(-1deg); }
            50%       { transform: translateY(-18px) rotate(1deg); }
        }

        .flower-svg { width: 220px; height: 280px; }

        .stem {
            width: 4px;
            height: 160px;
            background: linear-gradient(to bottom, #2d6a4f, #0c1f0e);
            border-radius: 10px;
            margin: 0 auto;
            position: relative;
        }

        .leaf {
            position: absolute;
            width: 52px;
            height: 24px;
            background: linear-gradient(135deg, #2d6a4f, #1b4332);
            border-radius: 0 80% 0 80%;
            box-shadow: inset -4px -4px 8px rgba(0,0,0,0.4);
        }

        .leaf-l { top: 35px; left: -46px; transform: rotate(-25deg); }
        .leaf-r { top: 75px; left: 4px;   transform: rotate(205deg); }

        /* ─── Text Cards ─── */
        .card {
            text-align: center;
            padding: 36px 48px;
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2px;
            border: 1px solid rgba(201, 169, 110, 0.15);
            max-width: 520px;
            position: relative;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.9s ease, transform 0.9s ease;
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Corner accents */
        .card::before,
        .card::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            border-color: var(--gold);
            border-style: solid;
            opacity: 0.5;
        }
        .card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
        .card::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

        .eyebrow {
            font-family: 'Raleway', sans-serif;
            font-weight: 100;
            font-size: 0.6rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.7;
            margin-bottom: 18px;
        }

        .headline {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 2rem;
            line-height: 1.3;
            letter-spacing: 1px;
            color: var(--ivory);
        }

        .subtitle {
            font-style: italic;
            font-size: 1.05rem;
            color: var(--blush);
            letter-spacing: 2px;
            margin-top: 14px;
            opacity: 0.85;
        }

        /* ─── Section 3 Special ─── */
        .name-display {
            font-family: 'Cormorant Garamond', serif;
            font-size: 5rem;
            font-weight: 300;
            letter-spacing: 12px;
            color: var(--ivory);
            text-transform: uppercase;
            margin-bottom: 6px;
            line-height: 1;
        }

        .arabic-line {
            font-size: 1.8rem;
            color: var(--gold);
            letter-spacing: 3px;
            font-style: italic;
            font-weight: 300;
            opacity: 0.9;
        }

        .divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 20px auto;
        }

        .forever {
            font-family: 'Raleway', sans-serif;
            font-weight: 100;
            font-size: 0.65rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: var(--blush);
            opacity: 0.6;
        }

        /* ─── Scroll Hint ─── */
        .scroll-hint {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .scroll-hint span {
            font-family: 'Raleway', sans-serif;
            font-weight: 100;
            font-size: 0.55rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(201, 169, 110, 0.4);
            animation: fadeUpDown 2.5s ease-in-out infinite;
        }

        .scroll-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, rgba(201,169,110,0.4), transparent);
            animation: fadeUpDown 2.5s ease-in-out infinite reverse;
        }

        @keyframes fadeUpDown {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50%       { opacity: 0.8; transform: translateY(5px); }
        }

        /* ─── Petal Rain ─── */
        .petal {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            animation: petalFall linear infinite;
        }

        @keyframes petalFall {
            0%   { opacity: 0; transform: translateY(-20px) rotate(0deg); }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.3; }
            100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>
    <canvas id="starfield"></canvas>

    <!-- ─── Section 1: Opening ─── -->
    <section id="sec1">
        <div class="bg-layer"></div>
        <div class="content">
            <div class="flower-wrap" id="tulip">
                <svg class="flower-svg" viewBox="0 0 100 120">
                    <defs>
                        <linearGradient id="tg1" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#ffb3c1"/>
                            <stop offset="100%" stop-color="#c9184a"/>
                        </linearGradient>
                        <linearGradient id="tg2" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#ff4d6d"/>
                            <stop offset="100%" stop-color="#800e13"/>
                        </linearGradient>
                        <filter id="blur-soft">
                            <feGaussianBlur stdDeviation="0.8" result="blur"/>
                            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                        </filter>
                    </defs>
                    <!-- Petals -->
                    <path d="M50 95 Q18 88 8 52 Q8 18 38 28 Q28 62 50 95" fill="url(#tg1)" filter="url(#blur-soft)" opacity="0.9"/>
                    <path d="M50 95 Q82 88 92 52 Q92 18 62 28 Q72 62 50 95" fill="url(#tg1)" filter="url(#blur-soft)" opacity="0.9"/>
                    <path d="M50 98 Q33 88 28 52 Q28 8 50 3 Q72 8 72 52 Q67 88 50 98" fill="url(#tg2)" filter="url(#blur-soft)"/>
                    <!-- Highlight -->
                    <path d="M50 40 Q46 28 48 8" stroke="rgba(255,230,235,0.35)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                </svg>
                <div class="stem">
                    <div class="leaf leaf-l"></div>
                    <div class="leaf leaf-r"></div>
                </div>
            </div>

            <div class="card" id="card1">
                <div class="eyebrow">A gift for you</div>
                <div class="headline">Until I can give it<br>to you in real</div>
                <div class="subtitle">with every intention</div>
            </div>
        </div>

        <div class="scroll-hint">
            <span>scroll</span>
            <div class="scroll-line"></div>
        </div>
    </section>

    <!-- ─── Section 2: Rose ─── -->
    <section id="sec2">
        <div class="bg-layer"></div>
        <div class="content">
            <div class="flower-wrap" id="rose" style="animation-delay: -3s;">
                <svg class="flower-svg" viewBox="0 0 100 120">
                    <defs>
                        <radialGradient id="rg1" cx="50%" cy="50%" r="50%">
                            <stop offset="0%"   stop-color="#ff4d6d"/>
                            <stop offset="60%"  stop-color="#c9184a"/>
                            <stop offset="100%" stop-color="#800e13"/>
                        </radialGradient>
                        <radialGradient id="rg2" cx="40%" cy="40%" r="60%">
                            <stop offset="0%"   stop-color="#ffb3c1"/>
                            <stop offset="100%" stop-color="#ff4d6d"/>
                        </radialGradient>
                    </defs>
                    <!-- Outer petals -->
                    <ellipse cx="50" cy="50" rx="40" ry="42" fill="url(#rg1)" opacity="0.5"/>
                    <path d="M50 8  Q75 8  87 35 Q95 60 75 80 Q62 92 50 92 Q38 92 25 80 Q5 60 13 35 Q25 8 50 8"  fill="#c9184a" opacity="0.7"/>
                    <!-- Mid petals -->
                    <path d="M50 18 Q68 18 78 40 Q84 60 66 74 Q58 82 50 82 Q42 82 34 74 Q16 60 22 40 Q32 18 50 18" fill="#ff4d6d" opacity="0.85"/>
                    <!-- Inner petals -->
                    <path d="M50 28 Q62 28 68 46 Q72 60 60 68 Q55 73 50 73 Q45 73 40 68 Q28 60 32 46 Q38 28 50 28" fill="url(#rg2)"/>
                    <!-- Centre spiral -->
                    <path d="M50 42 C53 38 58 40 56 46 C54 52 47 52 46 47 C45 43 48 40 50 42" fill="#800e13" opacity="0.8"/>
                    <!-- Highlight -->
                    <circle cx="43" cy="38" r="4" fill="rgba(255,230,235,0.15)"/>
                </svg>
                <div class="stem" style="height:180px;">
                    <div class="leaf leaf-l"></div>
                    <div class="leaf leaf-r"></div>
                </div>
            </div>

            <div class="card" id="card2">
                <div class="eyebrow">always & truly</div>
                <div class="headline">You make my life<br>worth living</div>
                <div class="subtitle">and I mean every word</div>
            </div>
        </div>
    </section>

    <!-- ─── Section 3: Declaration ─── -->
    <section id="sec3">
        <div class="bg-layer"></div>
        <div class="content">
            <div class="card" id="card3" style="max-width:640px; padding: 56px 72px;">
                <div class="eyebrow">with all of me</div>
                <div class="name-display">Sajda</div>
                <div class="divider"></div>
                <div class="arabic-line">我爱你</div>
                <div class="divider"></div>
                <div class="forever">forever &nbsp;·&nbsp; always &nbsp;·&nbsp; without condition</div>
            </div>
        </div>
    </section>

    <script>
        // ─── Cursor ───
        const dot  = document.getElementById('cursor-dot');
        const ring = document.getElementById('cursor-ring');
        let mx = 0, my = 0, rx = 0, ry = 0;

        document.addEventListener('mousemove', e => {
            mx = e.clientX;
            my = e.clientY;
            dot.style.transform = `translate(${mx - 3}px, ${my - 3}px)`;
        });

        (function trackRing() {
            rx += (mx - rx) * 0.12;
            ry += (my - ry) * 0.12;
            ring.style.left = rx + 'px';
            ring.style.top  = ry + 'px';
            requestAnimationFrame(trackRing);
        })();

        // ─── Starfield Canvas ───
        const canvas = document.getElementById('starfield');
        const ctx    = canvas.getContext('2d');

        function resize() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const STAR_COUNT = 120;
        const stars = Array.from({ length: STAR_COUNT }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.2 + 0.2,
            a: Math.random(),
            speed: Math.random() * 0.003 + 0.001,
            phase: Math.random() * Math.PI * 2,
        }));

        function drawStars(t) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                const alpha = 0.2 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(201,169,110,${alpha * 0.7})`;
                ctx.fill();
            });
            requestAnimationFrame(drawStars);
        }
        drawStars(0);

        // ─── Scroll-triggered card reveals ───
        const cards = document.querySelectorAll('.card');

        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (e.isIntersecting) e.target.classList.add('visible');
            });
        }, { threshold: 0.3 });

        cards.forEach(c => observer.observe(c));

        // Also reveal card1 on load
        setTimeout(() => document.getElementById('card1').classList.add('visible'), 400);

        // ─── Petal Rain ───
        const colors = ['#ffb3c1', '#ff85a1', '#ff4d6d', '#c9184a', '#f9c6d0'];

        function spawnPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            const size = Math.random() * 6 + 4;
            p.style.cssText = `
                left: ${Math.random() * 100}vw;
                top: -20px;
                width: ${size}px;
                height: ${size * 1.4}px;
                background: ${colors[Math.floor(Math.random() * colors.length)]};
                border-radius: 50% 0 50% 0;
                animation-duration: ${Math.random() * 8 + 6}s;
                animation-delay: ${Math.random() * 3}s;
                opacity: 0;
                filter: blur(${Math.random() * 0.5}px);
            `;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 14000);
        }

        setInterval(spawnPetal, 600);
    </script>
</body>
</html>
