<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>For Sajda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@100;200;300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06030a;
            --rose: #c9184a;
            --blush: #ffb3c1;
            --ivory: #f5f0eb;
            --gold: #c9a96e;
            --midnight: #0d0015;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; scroll-snap-type: y mandatory; }

        body {
            background: var(--bg);
            color: var(--ivory);
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
            /* cursor: none only on desktop, handled via JS */
        }

        /* ─── Custom Cursor (desktop only) ─── */
        #cursor-dot, #cursor-ring {
            display: none;
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            /* NO transform here — JS positions via left/top with manual offset */
        }

        #cursor-dot {
            width: 6px; height: 6px;
            background: var(--gold);
            z-index: 99999;
        }

        #cursor-ring {
            width: 28px; height: 28px;
            border: 1px solid rgba(201,169,110,0.5);
            z-index: 99998;
        }

        body.has-mouse { cursor: none; }

        /* ─── Canvases ─── */
        #trail-canvas, #starfield {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }
        #trail-canvas { z-index: 99990; }
        #starfield    { z-index: 0; }

        /* ══════════════════════════
           LOCK SCREEN
        ══════════════════════════ */
        #lock-screen {
            position: fixed;
            inset: 0;
            z-index: 9000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            transition: opacity 1.3s ease, transform 1.3s cubic-bezier(0.77,0,0.18,1);
            overflow: hidden;
        }

        #lock-screen.unlocking {
            opacity: 0;
            transform: scale(1.07);
            pointer-events: none;
        }

        .lock-bg {
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 70% 60% at 50% 50%, #1a0028 0%, transparent 65%),
                radial-gradient(ellipse 40% 40% at 80% 20%, rgba(201,24,74,0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        .lock-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(201,169,110,0.07);
            animation: spinSlow 22s linear infinite;
            pointer-events: none;
        }
        .lock-ring:nth-child(2) { width: min(340px, 80vw); height: min(340px, 80vw); }
        .lock-ring:nth-child(3) { width: min(480px, 110vw); height: min(480px, 110vw); animation-duration: 35s; animation-direction: reverse; border-color: rgba(201,169,110,0.04); }

        @keyframes spinSlow { to { transform: rotate(360deg); } }

        .lock-inner {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
            width: 100%;
            padding: 0 24px;
        }

        .lock-icon { animation: breathe 4s ease-in-out infinite; }
        .lock-icon svg { width: 34px; height: 34px; }

        @keyframes breathe {
            0%,100% { opacity: 0.3; transform: scale(1); }
            50%      { opacity: 0.65; transform: scale(1.06); }
        }

        .lock-hint { text-align: center; }

        .lock-eyebrow {
            font-family: 'Raleway', sans-serif;
            font-weight: 100;
            font-size: clamp(0.45rem, 2vw, 0.55rem);
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.45;
            margin-bottom: 14px;
        }

        .lock-chinese {
            font-size: clamp(1.8rem, 8vw, 2.6rem);
            font-weight: 300;
            color: var(--ivory);
            opacity: 0.75;
            letter-spacing: 6px;
        }

        .lock-subhint {
            font-family: 'Raleway', sans-serif;
            font-weight: 100;
            font-size: clamp(0.42rem, 1.8vw, 0.5rem);
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--blush);
            opacity: 0.3;
            margin-top: 10px;
        }

        /* PIN dots */
        .pin-dots {
            display: flex;
            gap: 20px;
        }

        .pin-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 1px solid rgba(201,169,110,0.35);
            background: transparent;
            transition: background 0.2s, border-color 0.2s, transform 0.18s, box-shadow 0.2s;
        }

        .pin-dot.filled {
            background: var(--gold);
            border-color: var(--gold);
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(201,169,110,0.4);
        }

        .pin-dot.error {
            background: var(--rose);
            border-color: var(--rose);
            box-shadow: 0 0 10px rgba(201,24,74,0.4);
            animation: shake 0.45s ease;
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-7px); }
            40%      { transform: translateX(7px); }
            60%      { transform: translateX(-4px); }
            80%      { transform: translateX(4px); }
        }

        .lock-error {
            font-family: 'Raleway', sans-serif;
            font-size: 0.5rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--rose);
            opacity: 0;
            transition: opacity 0.4s;
            height: 14px;
        }
        .lock-error.show { opacity: 0.65; }

        /* ─── On-screen numpad ─── */
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: min(280px, 85vw);
            margin-top: 4px;
        }

        .num-btn {
            aspect-ratio: 1;
            border: 1px solid rgba(201,169,110,0.18);
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            color: var(--ivory);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            font-weight: 300;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .num-btn:active {
            background: rgba(201,169,110,0.15);
            border-color: rgba(201,169,110,0.5);
            transform: scale(0.92);
        }

        /* Delete button spans col 3 row 4, empty col 1 row 4 */
        .num-btn.empty    { background: transparent; border-color: transparent; pointer-events: none; }
        .num-btn.del-btn  { font-size: 1rem; opacity: 0.6; }

        /* ─── Unlock flash ─── */
        #unlock-flash {
            position: fixed; inset: 0;
            z-index: 8999;
            background: radial-gradient(ellipse at 50% 50%, rgba(201,169,110,0.3) 0%, transparent 70%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #unlock-flash.flash { opacity: 1; }

        /* ══════════════════════════
           MAIN SITE
        ══════════════════════════ */
        #main-site {
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease 0.7s;
        }
        #main-site.revealed { opacity: 1; pointer-events: all; }

        section {
            height: 100vh; width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start;
            position: relative;
            overflow: hidden;
        }

        .bg-layer { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(28px, 5vw, 50px);
            padding: 0 20px;
        }

        #sec1 .bg-layer { background: radial-gradient(ellipse 60% 60% at 50% 40%, #1a0028 0%, transparent 70%), radial-gradient(ellipse 80% 40% at 50% 90%, #0d0015 0%, transparent 60%); }
        #sec2 .bg-layer { background: radial-gradient(ellipse 50% 50% at 50% 50%, #1c0010 0%, transparent 70%); }
        #sec3 .bg-layer { background: radial-gradient(ellipse 70% 50% at 50% 50%, #0a0020 0%, transparent 70%), radial-gradient(ellipse 40% 40% at 30% 30%, rgba(201,24,74,0.05) 0%, transparent 60%); }

        .flower-wrap {
            animation: float 7s ease-in-out infinite;
            filter: drop-shadow(0 30px 60px rgba(201,24,74,0.25));
            transform-origin: bottom center;
        }

        @keyframes float {
            0%,100% { transform: translateY(0px) rotate(-1deg); }
            50%      { transform: translateY(-18px) rotate(1deg); }
        }

        .flower-svg { width: clamp(140px, 40vw, 220px); height: auto; }

        .stem {
            width: 4px;
            height: clamp(100px, 22vw, 160px);
            background: linear-gradient(to bottom, #2d6a4f, #0c1f0e);
            border-radius: 10px;
            margin: 0 auto;
            position: relative;
        }

        .leaf {
            position: absolute;
            width: 52px; height: 24px;
            background: linear-gradient(135deg, #2d6a4f, #1b4332);
            border-radius: 0 80% 0 80%;
            box-shadow: inset -4px -4px 8px rgba(0,0,0,0.4);
        }
        .leaf-l { top: 30px; left: -46px; transform: rotate(-25deg); }
        .leaf-r { top: 65px; left: 4px;   transform: rotate(205deg); }

        .card {
            text-align: center;
            padding: clamp(22px, 5vw, 36px) clamp(20px, 8vw, 48px);
            background: rgba(255,255,255,0.025);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2px;
            border: 1px solid rgba(201,169,110,0.15);
            max-width: min(520px, 92vw);
            position: relative;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.9s ease, transform 0.9s ease;
        }
        .card.visible { opacity: 1; transform: translateY(0); }
        .card::before, .card::after {
            content: ''; position: absolute;
            width: 14px; height: 14px;
            border-color: var(--gold); border-style: solid; opacity: 0.5;
        }
        .card::before { top:-1px; left:-1px; border-width: 1px 0 0 1px; }
        .card::after  { bottom:-1px; right:-1px; border-width: 0 1px 1px 0; }

        .eyebrow {
            font-family: 'Raleway', sans-serif;
            font-weight: 100;
            font-size: clamp(0.5rem, 2vw, 0.6rem);
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.7;
            margin-bottom: 14px;
        }

        .headline {
            font-weight: 300;
            font-size: clamp(1.4rem, 5vw, 2rem);
            line-height: 1.3;
            letter-spacing: 1px;
            color: var(--ivory);
        }

        .subtitle {
            font-style: italic;
            font-size: clamp(0.85rem, 3vw, 1.05rem);
            color: var(--blush);
            letter-spacing: 2px;
            margin-top: 12px;
            opacity: 0.85;
        }

        .name-display {
            font-size: clamp(2.8rem, 12vw, 5rem);
            font-weight: 300;
            letter-spacing: clamp(6px, 3vw, 12px);
            color: var(--ivory);
            text-transform: uppercase;
            margin-bottom: 6px;
            line-height: 1;
        }

        .arabic-line {
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            color: var(--gold);
            letter-spacing: 3px;
            font-style: italic;
            font-weight: 300;
            opacity: 0.9;
        }

        .divider {
            width: 80px; height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 18px auto;
        }

        .forever {
            font-family: 'Raleway', sans-serif;
            font-weight: 100;
            font-size: clamp(0.5rem, 2vw, 0.65rem);
            letter-spacing: clamp(4px, 2vw, 10px);
            text-transform: uppercase;
            color: var(--blush);
            opacity: 0.6;
        }

        .scroll-hint {
            position: absolute;
            bottom: 28px; left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .scroll-hint span {
            font-family: 'Raleway', sans-serif;
            font-weight: 100;
            font-size: 0.5rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(201,169,110,0.4);
            animation: fadeUD 2.5s ease-in-out infinite;
        }

        .scroll-line {
            width: 1px; height: 36px;
            background: linear-gradient(to bottom, rgba(201,169,110,0.4), transparent);
            animation: fadeUD 2.5s ease-in-out infinite reverse;
        }

        @keyframes fadeUD {
            0%,100% { opacity: 0.3; transform: translateY(0); }
            50%      { opacity: 0.7; transform: translateY(4px); }
        }

        .petal {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            animation: petalFall linear infinite;
        }

        @keyframes petalFall {
            0%   { opacity: 0;   transform: translateY(-20px) rotate(0deg); }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.3; }
            100% { opacity: 0;   transform: translateY(110vh) rotate(720deg); }
        }

        /* Reduce motion for accessibility */
        @media (prefers-reduced-motion: reduce) {
            .flower-wrap, .lock-ring, .petal { animation: none; }
        }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>
    <canvas id="trail-canvas"></canvas>
    <canvas id="starfield"></canvas>
    <div id="unlock-flash"></div>

    <!-- ══ LOCK SCREEN ══ -->
    <div id="lock-screen">
        <div class="lock-bg"></div>
        <div class="lock-ring"></div>
        <div class="lock-ring"></div>

        <div class="lock-inner">
            <div class="lock-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>

            <div class="lock-hint">
                <div class="lock-eyebrow">enter to unlock</div>
                <div class="lock-chinese">我的生日</div>
                <div class="lock-subhint">hint · my birthday</div>
            </div>

            <div class="pin-dots">
                <div class="pin-dot" id="d0"></div>
                <div class="pin-dot" id="d1"></div>
                <div class="pin-dot" id="d2"></div>
                <div class="pin-dot" id="d3"></div>
            </div>

            <div class="lock-error" id="lock-error">incorrect</div>

            <!-- On-screen numpad — works on ALL devices -->
            <div class="numpad" id="numpad">
                <button class="num-btn" data-n="1">1</button>
                <button class="num-btn" data-n="2">2</button>
                <button class="num-btn" data-n="3">3</button>
                <button class="num-btn" data-n="4">4</button>
                <button class="num-btn" data-n="5">5</button>
                <button class="num-btn" data-n="6">6</button>
                <button class="num-btn" data-n="7">7</button>
                <button class="num-btn" data-n="8">8</button>
                <button class="num-btn" data-n="9">9</button>
                <button class="num-btn empty"></button>
                <button class="num-btn" data-n="0">0</button>
                <button class="num-btn del-btn" id="del-btn">⌫</button>
            </div>
        </div>
    </div>

    <!-- ══ MAIN SITE ══ -->
    <div id="main-site">
        <section id="sec1">
            <div class="bg-layer"></div>
            <div class="content">
                <div class="flower-wrap">
                    <svg class="flower-svg" viewBox="0 0 100 120">
                        <defs>
                            <linearGradient id="tg1" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#ffb3c1"/>
                                <stop offset="100%" stop-color="#c9184a"/>
                            </linearGradient>
                            <linearGradient id="tg2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#ff4d6d"/>
                                <stop offset="100%" stop-color="#800e13"/>
                            </linearGradient>
                        </defs>
                        <path d="M50 95 Q18 88 8 52 Q8 18 38 28 Q28 62 50 95" fill="url(#tg1)" opacity="0.9"/>
                        <path d="M50 95 Q82 88 92 52 Q92 18 62 28 Q72 62 50 95" fill="url(#tg1)" opacity="0.9"/>
                        <path d="M50 98 Q33 88 28 52 Q28 8 50 3 Q72 8 72 52 Q67 88 50 98" fill="url(#tg2)"/>
                        <path d="M50 40 Q46 28 48 8" stroke="rgba(255,230,235,0.35)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                    </svg>
                    <div class="stem">
                        <div class="leaf leaf-l"></div>
                        <div class="leaf leaf-r"></div>
                    </div>
                </div>
                <div class="card" id="card1">
                    <div class="eyebrow">A gift for you</div>
                    <div class="headline">Until I can give it<br>to you in real</div>
                    <div class="subtitle">with every intention</div>
                </div>
            </div>
            <div class="scroll-hint">
                <span>scroll</span>
                <div class="scroll-line"></div>
            </div>
        </section>

        <section id="sec2">
            <div class="bg-layer"></div>
            <div class="content">
                <div class="flower-wrap" style="animation-delay:-3s;">
                    <svg class="flower-svg" viewBox="0 0 100 120">
                        <defs>
                            <radialGradient id="rg1" cx="50%" cy="50%" r="50%">
                                <stop offset="0%"   stop-color="#ff4d6d"/>
                                <stop offset="60%"  stop-color="#c9184a"/>
                                <stop offset="100%" stop-color="#800e13"/>
                            </radialGradient>
                            <radialGradient id="rg2" cx="40%" cy="40%" r="60%">
                                <stop offset="0%"   stop-color="#ffb3c1"/>
                                <stop offset="100%" stop-color="#ff4d6d"/>
                            </radialGradient>
                        </defs>
                        <ellipse cx="50" cy="50" rx="40" ry="42" fill="url(#rg1)" opacity="0.5"/>
                        <path d="M50 8 Q75 8 87 35 Q95 60 75 80 Q62 92 50 92 Q38 92 25 80 Q5 60 13 35 Q25 8 50 8" fill="#c9184a" opacity="0.7"/>
                        <path d="M50 18 Q68 18 78 40 Q84 60 66 74 Q58 82 50 82 Q42 82 34 74 Q16 60 22 40 Q32 18 50 18" fill="#ff4d6d" opacity="0.85"/>
                        <path d="M50 28 Q62 28 68 46 Q72 60 60 68 Q55 73 50 73 Q45 73 40 68 Q28 60 32 46 Q38 28 50 28" fill="url(#rg2)"/>
                        <path d="M50 42 C53 38 58 40 56 46 C54 52 47 52 46 47 C45 43 48 40 50 42" fill="#800e13" opacity="0.8"/>
                        <circle cx="43" cy="38" r="4" fill="rgba(255,230,235,0.15)"/>
                    </svg>
                    <div class="stem" style="height:clamp(100px,22vw,180px);">
                        <div class="leaf leaf-l"></div>
                        <div class="leaf leaf-r"></div>
                    </div>
                </div>
                <div class="card" id="card2">
                    <div class="eyebrow">always &amp; truly</div>
                    <div class="headline">You make my life<br>worth living</div>
                    <div class="subtitle">and I mean every word</div>
                </div>
            </div>
        </section>

        <section id="sec3">
            <div class="bg-layer"></div>
            <div class="content">
                <div class="card" id="card3" style="max-width:min(640px,92vw); padding:clamp(30px,6vw,56px) clamp(24px,8vw,72px);">
                    <div class="eyebrow">with all of me</div>
                    <div class="name-display">Sajda</div>
                    <div class="divider"></div>
                    <div class="arabic-line">我爱你</div>
                    <div class="divider"></div>
                    <div class="forever">forever &nbsp;·&nbsp; always &nbsp;·&nbsp; without condition</div>
                </div>
            </div>
        </section>
    </div>

    <script>
    // CURSOR (desktop only - activates on first mousemove, hidden on touch)
    const dot  = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    const DOT_R  = 3;   // half of 6px
    const RING_R = 14;  // half of 28px

    let mx = -200, my = -200;
    let rx = -200, ry = -200;
    let hasMouse = false;

    document.addEventListener('mousemove', e => {
        mx = e.clientX;
        my = e.clientY;
        if (!hasMouse) {
            hasMouse = true;
            document.body.classList.add('has-mouse');
            dot.style.display  = 'block';
            ring.style.display = 'block';
        }
    });

    (function animCursor() {
        if (hasMouse) {
            dot.style.left  = (mx - DOT_R)  + 'px';
            dot.style.top   = (my - DOT_R)  + 'px';
            rx += (mx - rx) * 0.13;
            ry += (my - ry) * 0.13;
            ring.style.left = (rx - RING_R) + 'px';
            ring.style.top  = (ry - RING_R) + 'px';
        }
        requestAnimationFrame(animCursor);
    })();

    // ═══════════════════════════════════════
    //  TRAIL CANVAS (mouse + touch)
    // ═══════════════════════════════════════
    const trailCanvas = document.getElementById('trail-canvas');
    const tctx = trailCanvas.getContext('2d');
    const trail = [];
    const TRAIL_LEN = 30;

    function resizeTrail() {
        trailCanvas.width  = window.innerWidth;
        trailCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeTrail);
    resizeTrail();

    function pushTrail(x, y) {
        trail.push({ x, y });
        if (trail.length > TRAIL_LEN) trail.shift();
    }

    document.addEventListener('mousemove', e => pushTrail(e.clientX, e.clientY));
    document.addEventListener('touchmove', e => {
        pushTrail(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    (function drawTrail() {
        tctx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
        for (let i = 1; i < trail.length; i++) {
            const t    = i / trail.length;
            const p    = trail[i];
            const prev = trail[i - 1];
            tctx.beginPath();
            tctx.moveTo(prev.x, prev.y);
            tctx.lineTo(p.x, p.y);
            tctx.strokeStyle = `rgba(201,169,110,${t * 0.28})`;
            tctx.lineWidth   = t * 3;
            tctx.lineCap     = 'round';
            tctx.stroke();
            if (i % 4 === 0) {
                tctx.beginPath();
                tctx.arc(p.x, p.y, t * 2.5, 0, Math.PI * 2);
                tctx.fillStyle = `rgba(255,179,193,${t * 0.18})`;
                tctx.fill();
            }
        }
        requestAnimationFrame(drawTrail);
    })();

    // ═══════════════════════════════════════
    //  STARFIELD
    // ═══════════════════════════════════════
    const starCanvas = document.getElementById('starfield');
    const sctx = starCanvas.getContext('2d');

    function resizeStar() {
        starCanvas.width  = window.innerWidth;
        starCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeStar);
    resizeStar();

    const stars = Array.from({ length: 130 }, () => ({
        x: Math.random() * starCanvas.width,
        y: Math.random() * starCanvas.height,
        r: Math.random() * 1.2 + 0.2,
        speed: Math.random() * 0.003 + 0.001,
        phase: Math.random() * Math.PI * 2,
    }));

    let stT = 0;
    (function drawStars() {
        stT += 0.016;
        sctx.clearRect(0, 0, starCanvas.width, starCanvas.height);
        stars.forEach(s => {
            const alpha = 0.15 + 0.5 * (0.5 + 0.5 * Math.sin(stT * s.speed * 60 + s.phase));
            sctx.beginPath();
            sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            sctx.fillStyle = `rgba(201,169,110,${alpha})`;
            sctx.fill();
        });
        requestAnimationFrame(drawStars);
    })();

    // ═══════════════════════════════════════
    //  PASSWORD GATE
    // ═══════════════════════════════════════
    const PASSWORD = '0918';
    const lockEl   = document.getElementById('lock-screen');
    const mainSite = document.getElementById('main-site');
    const pinDots  = [0,1,2,3].map(i => document.getElementById('d' + i));
    const errorMsg = document.getElementById('lock-error');
    const flash    = document.getElementById('unlock-flash');

    let pinValue = '';
    let unlocked = false;

    function updateDots() {
        pinDots.forEach((d, i) => {
            d.classList.remove('filled', 'error');
            if (i < pinValue.length) d.classList.add('filled');
        });
    }

    function pressKey(n) {
        if (unlocked || pinValue.length >= 4) return;
        pinValue += n;
        updateDots();
        errorMsg.classList.remove('show');
        if (pinValue.length === 4) {
            setTimeout(() => {
                if (pinValue === PASSWORD) triggerUnlock();
                else triggerError();
            }, 80);
        }
    }

    function pressDelete() {
        if (unlocked) return;
        pinValue = pinValue.slice(0, -1);
        updateDots();
        errorMsg.classList.remove('show');
    }

    // Numpad buttons
    document.querySelectorAll('.num-btn[data-n]').forEach(btn => {
        btn.addEventListener('click', () => pressKey(btn.dataset.n));
        btn.addEventListener('touchend', e => { e.preventDefault(); pressKey(btn.dataset.n); });
    });

    document.getElementById('del-btn').addEventListener('click', pressDelete);
    document.getElementById('del-btn').addEventListener('touchend', e => { e.preventDefault(); pressDelete(); });

    // Physical keyboard support (desktop)
    document.addEventListener('keydown', e => {
        if (unlocked) return;
        if (e.key >= '0' && e.key <= '9') pressKey(e.key);
        if (e.key === 'Backspace') pressDelete();
    });

    function triggerError() {
        pinDots.forEach(d => { d.classList.remove('filled'); d.classList.add('error'); });
        errorMsg.classList.add('show');
        pinValue = '';
        setTimeout(() => {
            pinDots.forEach(d => d.classList.remove('error'));
            errorMsg.classList.remove('show');
        }, 950);
    }

    function triggerUnlock() {
        unlocked = true;
        flash.classList.add('flash');
        setTimeout(() => flash.classList.remove('flash'), 600);
        setTimeout(() => lockEl.classList.add('unlocking'), 150);
        setTimeout(() => {
            lockEl.style.display = 'none';
            mainSite.classList.add('revealed');
            initSite();
        }, 1500);
    }

    // ═══════════════════════════════════════
    //  SITE INIT
    // ═══════════════════════════════════════
    function initSite() {
        const cards = document.querySelectorAll('.card');
        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.25 });
        cards.forEach(c => obs.observe(c));
        setTimeout(() => document.getElementById('card1').classList.add('visible'), 350);

        const petalColors = ['#ffb3c1','#ff85a1','#ff4d6d','#c9184a','#f9c6d0'];
        function spawnPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            const size = Math.random() * 6 + 4;
            p.style.cssText = `left:${Math.random()*100}vw;top:-20px;width:${size}px;height:${size*1.4}px;background:${petalColors[Math.floor(Math.random()*petalColors.length)]};border-radius:50% 0 50% 0;animation-duration:${Math.random()*8+6}s;animation-delay:${Math.random()*2}s;opacity:0;filter:blur(${Math.random()*0.5}px);`;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 14000);
        }
        setInterval(spawnPetal, 700);
    }
    </script>
</body>
</html>
