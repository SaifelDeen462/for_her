<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        :root {
            --bg: #000000;
            --pink-light: #ffb3c1;
            --pink-mid: #ff85a1;
            --pink-dark: #ff4d6d;
            --red-deep: #800e13;
            --baby-blue: #caf0f8;
            --blue-glow: #0077b6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow-x: hidden;
        }

        section {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start;
            position: relative;
            overflow: hidden;
        }

        /* Starry Particle Field */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Flower Styling */
        .flower-stage {
            position: relative;
            z-index: 2;
            animation: floating 6s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(255, 77, 109, 0.3));
        }

        .flower-svg {
            width: 250px;
            height: 250px;
        }

        .stem-system {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -20px;
        }

        .stem {
            width: 6px;
            height: 200px;
            background: linear-gradient(to bottom, #1b4332, #081c15);
            border-radius: 10px;
            position: relative;
        }

        .leaf {
            position: absolute;
            width: 60px;
            height: 30px;
            background: linear-gradient(45deg, #2d6a4f, #1b4332);
            border-radius: 0 100% 0 100%;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.3);
        }

        .leaf-left { top: 40px; left: -55px; transform: rotate(-20deg); }
        .leaf-right { top: 80px; left: 5px; transform: rotate(200deg); }

        /* Professional Typography */
        .text-container {
            margin-top: 50px;
            text-align: center;
            z-index: 10;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 80%;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--baby-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1rem;
            color: var(--pink-light);
            letter-spacing: 2px;
            font-style: italic;
        }

        /* Animations */
        @keyframes floating {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .scroll-hint {
            position: absolute;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            letter-spacing: 3px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <section>
        <div class="flower-stage">
            <svg class="flower-svg" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id="tulipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--pink-light);stop-opacity:1" />
                        <stop offset="100%" style="stop-color:var(--pink-dark);stop-opacity:1" />
                    </linearGradient>
                    <filter id="shadow">
                        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
                    </filter>
                </defs>
                <path d="M50 85 Q30 80 20 50 Q20 20 50 10 Q80 20 80 50 Q70 80 50 85" fill="var(--red-deep)" opacity="0.4"/>
                <path d="M50 90 Q20 85 10 50 Q10 20 40 30 Q30 60 50 90" fill="url(#tulipGrad)" filter="url(#shadow)"/>
                <path d="M50 90 Q80 85 90 50 Q90 20 60 30 Q70 60 50 90" fill="url(#tulipGrad)" filter="url(#shadow)"/>
                <path d="M50 95 Q35 85 30 50 Q30 10 50 5 Q70 10 70 50 Q65 85 50 95" fill="url(#tulipGrad)" filter="url(#shadow)"/>
            </svg>
            <div class="stem-system">
                <div class="stem"><div class="leaf leaf-left"></div><div class="leaf leaf-right"></div></div>
            </div>
        </div>
        <div class="text-container">
            <h1>Until I can give it to you</h1>
            <p>in real...</p>
        </div>
        <div class="scroll-hint">SCROLL DOWN</div>
    </section>

    <section>
        <div class="flower-stage">
            <svg class="flower-svg" viewBox="0 0 100 100">
                <defs>
                    <radialGradient id="roseCenter" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--pink-dark)" />
                        <stop offset="100%" style="stop-color:var(--red-deep)" />
                    </radialGradient>
                </defs>
                <circle cx="50" cy="50" r="40" fill="url(#roseCenter)" />
                <path d="M50 10 Q70 10 85 35 T50 85 Q20 85 15 50 T50 10" fill="var(--pink-dark)" opacity="0.6"/>
                <path d="M50 20 Q65 20 75 40 T50 75 Q30 75 25 45 T50 20" fill="var(--pink-mid)" opacity="0.8"/>
                <path d="M50 30 Q60 30 65 45 T50 65 Q35 65 35 45 T50 30" fill="var(--pink-light)"/>
                <path d="M50 40 A10 10 0 1 1 40 50" fill="none" stroke="var(--red-deep)" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <div class="stem-system">
                <div class="stem" style="height: 220px;"><div class="leaf leaf-left"></div><div class="leaf leaf-right"></div></div>
            </div>
        </div>
        <div class="text-container">
            <h1>You make my life</h1>
            <p>worth living.</p>
        </div>
    </section>

    <script>
        // High-Performance Particle Engine
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = Math.random() * 1 + 0.2;
                this.color = Math.random() > 0.5 ? '#ff85a1' : '#caf0f8';
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Cursor Sparkle Trail
        window.addEventListener('mousemove', (e) => {
            for(let i=0; i<2; i++) {
                const p = new Particle();
                p.x = e.clientX;
                p.y = e.clientY;
                p.speedY = (Math.random() - 0.5) * 2;
                particles.push(p);
                setTimeout(() => {
                    particles.shift();
                }, 1000);
            }
        });
    </script>
</body>
</html>
