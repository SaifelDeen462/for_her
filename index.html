<style>
    /* New Styles for the Sable Modal */
    .sable-trigger-wrap {
        margin-top: 20px;
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.8s ease 1s;
    }
    .card.visible + .sable-trigger-wrap {
        opacity: 1;
        transform: translateY(0);
    }

    .btn-sable {
        background: transparent;
        border: 1px solid var(--gold);
        color: var(--gold);
        font-family: 'Raleway', sans-serif;
        font-size: 0.6rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        padding: 12px 24px;
        cursor: pointer;
        transition: all 0.3s ease;
        border-radius: 2px;
    }

    .btn-sable:hover {
        background: rgba(201, 169, 110, 0.1);
        box-shadow: 0 0 15px rgba(201, 169, 110, 0.2);
    }

    #sable-modal {
        position: fixed;
        inset: 0;
        background: rgba(6, 3, 10, 0.95);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        z-index: 200000;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .sable-content {
        position: relative;
        max-width: 100%;
        max-height: 80vh;
        display: flex;
        justify-content: center;
    }

    .sable-img {
        max-width: 90vw;
        max-height: 70vh;
        border: 1px solid rgba(201, 169, 110, 0.3);
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        object-fit: contain;
    }

    .close-sable {
        margin-top: 30px;
        color: var(--ivory);
        font-family: 'Raleway', sans-serif;
        font-size: 0.55rem;
        letter-spacing: 5px;
        text-transform: uppercase;
        opacity: 0.5;
        cursor: pointer;
        border-bottom: 1px solid transparent;
        transition: 0.3s;
    }

    .close-sable:hover {
        opacity: 1;
        border-color: var(--gold);
    }
</style>

<div class="card" id="card1">
    <div class="eyebrow">A gift for you</div>
    <div class="headline">Until I can give it<br>to you in real</div>
    <div class="subtitle">with every intention</div>
</div>

<div class="sable-trigger-wrap">
    <button class="btn-sable" id="open-sable">Show Sable</button>
</div>

<div id="sable-modal">
    <div class="sable-content">
        <img src="image_e13146.jpg" alt="Sable" class="sable-img">
    </div>
    <div class="close-sable" id="close-sable">Close View</div>
</div>

<script>
    // ... your existing cursor, trail, starfield, and lock-screen scripts ...

    // ADD THIS TO YOUR SCRIPT SECTION:
    const openSable = document.getElementById('open-sable');
    const closeSable = document.getElementById('close-sable');
    const sableModal = document.getElementById('sable-modal');

    openSable.addEventListener('click', () => {
        sableModal.style.display = 'flex';
        // Optional: stop body scroll when open
        document.body.style.overflow = 'hidden';
    });

    closeSable.addEventListener('click', () => {
        sableModal.style.display = 'none';
        document.body.style.overflow = 'auto';
    });

    // Close modal if clicking outside the image
    sableModal.addEventListener('click', (e) => {
        if (e.target === sableModal) {
            sableModal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    });
</script>
