<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Digital Flower for You</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="night-sky" id="sky"></div>
    
    <div class="main-container">
        <div class="flower">
            <div class="tulip-head">
                <div class="petal-left"></div>
                <div class="petal-center"></div>
                <div class="petal-right"></div>
            </div>
            <div class="stem"></div>
            <div class="leaf"></div>
        </div>

        <div class="text-wrapper">
            <h1 class="glow-text">For the person who deserves the world.</h1>
            <p class="sub-text">Until I can give it to you <span>in real...</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
