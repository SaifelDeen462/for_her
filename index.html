<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sajda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@100;200;300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06030a;
            --rose: #c9184a;
            --blush: #ffb3c1;
            --ivory: #f5f0eb;
            --gold: #c9a96e;
            --midnight: #0d0015;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; scroll-snap-type: y mandatory; }

        body {
            background: var(--bg);
            color: var(--ivory);
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
            cursor: none;
        }

        /* ─── Custom Cursor ─── */
        #cursor-dot {
            position: fixed;
            width: 6px; height: 6px;
            background: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
        }

        #cursor-ring {
            position: fixed;
            width: 28px; height: 28px;
            border: 1px solid rgba(201,169,110,0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99998;
            transform: translate(-50%, -50%);
        }

        /* ─── Trail Canvas ─── */
        #trail-canvas {
            position: fixed;
            inset: 0;
            z-index: 99990;
            pointer-events: none;
        }

        /* ─── Starfield Canvas ─── */
        #starfield {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ══════════════════════════════
           LOCK SCREEN
        ══════════════════════════════ */
        #lock-screen {
            position: fixed;
            inset: 0;
            z-index: 9000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            transition: opacity 1.3s ease, transform 1.3s cubic-bezier(0.77,0,0.18,1);
        }

        #lock-screen.unlocking {
            opacity: 0;
            transform: scale(1.07);
            pointer-events: none;
        }

        .lock-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 60% at 50% 50%, #1a0028 0%, transparent 65%),
                radial-gradient(ellipse 40% 40% at 80% 20%, rgba(201,24,74,0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        .lock-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(201,169,110,0.07);
            animation: spinSlow 22s linear infinite;
            pointer-events: none;
        }
        .lock-ring:nth-child(2) { width: 340px; height: 340px; }
        .lock-ring:nth-child(3) { width: 480px; height: 480px; animation-duration: 35s; animation-direction: reverse; border-color: rgba(201,169,110,0.04); }

        @keyframes spinSlow { to { transform: rotate(360deg); } }

        .lock-inner {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .lock-icon {
            animation: breathe 4s ease-in-out infinite;
        }
        .lock-icon svg { width: 38px; height: 38px; }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50%       { opacity: 0.65; transform: scale(1.06); }
        }

        .lock-hint { text-align: center; }

        .lock-eyebrow {
            font-family: 'Raleway', sans-serif;
            font-weight: 100;
            font-size: 0.52rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.45;
            margin-bottom: 18px;
        }

        .lock-chinese {
            font-size: 2.4rem;
            font-weight: 300;
            color: var(--ivory);
            opacity: 0.75;
            letter-spacing: 6px;
            line-height: 1.3;
        }

        .lock-subhint {
            font-family: 'Raleway', sans-serif;
            font-weight: 100;
            font-size: 0.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--blush);
            opacity: 0.3;
            margin-top: 12px;
        }

        /* PIN dots */
        .pin-dots {
            display: flex;
            gap: 20px;
            margin-top: 4px;
        }

        .pin-dot {
            width: 13px; height: 13px;
            border-radius: 50%;
            border: 1px solid rgba(201,169,110,0.35);
            background: transparent;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.18s ease, box-shadow 0.2s ease;
        }

        .pin-dot.filled {
            background: var(--gold);
            border-color: var(--gold);
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(201,169,110,0.4);
        }

        .pin-dot.error {
            background: var(--rose);
            border-color: var(--rose);
            box-shadow: 0 0 10px rgba(201,24,74,0.4);
            animation: shake 0.45s ease;
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-7px); }
            40%      { transform: translateX(7px); }
            60%      { transform: translateX(-4px); }
            80%      { transform: translateX(4px); }
        }

        #pin-input {
            position: absolute;
            opacity: 0;
            width: 1px; height: 1px;
            left: 50%; top: 50%;
            pointer-events: none;
        }

        .lock-error {
            font-family: 'Raleway', sans-serif;
            font-size: 0.52rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--rose);
            opacity: 0;
            transition: opacity 0.4s ease;
            height: 14px;
        }
        .lock-error.show { opacity: 0.65; }

        .tap-hint {
            font-family: 'Raleway', sans-serif;
            font-size: 0.48rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(201,169,110,0.28);
            animation: fadeUpDown 3s ease-in-out infinite;
        }

        @keyframes fadeUpDown {
            0%,100% { opacity: 0.28; }
            50%      { opacity: 0.65; }
        }

        /* ─── Unlock flash ─── */
        #unlock-flash {
            position: fixed;
            inset: 0;
            z-index: 8999;
            background: radial-gradient(ellipse at 50% 50%, rgba(201,169,110,0.3) 0%, transparent 70%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #unlock-flash.flash { opacity: 1; }

        /* ══════════════════════════════
           MAIN SITE
        ══════════════════════════════ */
        #main-site {
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease 0.7s;
        }
        #main-site.revealed {
            opacity: 1;
            pointer-events: all;
        }

        section {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start;
            position: relative;
            overflow: hidden;
        }

        .bg-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
        }

        #sec1 .bg-layer {
            background:
                radial-gradient(ellipse 60% 60% at 50% 40%, #1a0028 0%, transparent 70%),
                radial-gradient(ellipse 80% 40% at 50% 90%, #0d0015 0%, transparent 60%);
        }

        #sec2 .bg-layer {
            background: radial-gradient(ellipse 50% 50% at 50% 50%, #1c0010 0%, transparent 70%);
        }

        #sec3 .bg-layer {
            background:
                radial-gradient(ellipse 70% 50% at 50% 50%, #0a0020 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 30% 30%, rgba(201,24,74,0.05) 0%, transparent 60%);
        }

        .flower-wrap {
            animation: float 7s ease-in-out infinite;
            filter: drop-shadow(0 30px 60px rgba(201,24,74,0.25));
            transform-origin: bottom center;
        }

        @keyframes float {
            0%,100% { transform: translateY(0px) rotate(-1deg); }
            50%      { transform: translateY(-18px) rotate(1deg); }
        }

        .flower-svg { width: 220px; height: 280px; }

        .stem {
            width: 4px;
            height: 160px;
            background: linear-gradient(to bottom, #2d6a4f, #0c1f0e);
            border-radius: 10px;
            margin: 0 auto;
            position: relative;
        }

        .leaf {
            position: absolute;
            width: 52px; height: 24px;
            background: linear-gradient(135deg, #2d6a4f, #1b4332);
            border-radius: 0 80% 0 80%;
            box-shadow: inset -4px -4px 8px rgba(0,0,0,0.4);
        }

        .leaf-l { top: 35px; left: -46px; transform: rotate(-25deg); }
        .leaf-r { top: 75px; left: 4px;   transform: rotate(205deg); }

        .card {
            text-align: center;
            padding: 36px 48px;
            background: rgba(255,255,255,0.025);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2px;
            border: 1px solid rgba(201,169,110,0.15);
            max-width: 520px;
            position: relative;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.9s ease, transform 0.9s ease;
        }

        .card.visible { opacity: 1; transform: translateY(0); }

        .card::before, .card::after {
            content: '';
            position: absolute;
            width: 14px; height: 14px;
            border-color: var(--gold);
            border-style: solid;
            opacity: 0.5;
        }
        .card::before { top:-1px; left:-1px; border-width: 1px 0 0 1px; }
        .card::after  { bottom:-1px; right:-1px; border-width: 0 1px 1px 0; }

        .eyebrow {
            font-family: 'Raleway', sans-serif;
            font-weight: 100;
            font-size: 0.6rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.7;
            margin-bottom: 18px;
        }

        .headline {
            font-weight: 300;
            font-size: 2rem;
            line-height: 1.3;
            letter-spacing: 1px;
            color: var(--ivory);
        }

        .subtitle {
            font-style: italic;
            font-size: 1.05rem;
            color: var(--blush);
            letter-spacing: 2px;
            margin-top: 14px;
            opacity: 0.85;
        }

        .name-display {
            font-size: 5rem;
            font-weight: 300;
            letter-spacing: 12px;
            color: var(--ivory);
            text-transform: uppercase;
            margin-bottom: 6px;
            line-height: 1;
        }

        .arabic-line {
            font-size: 1.8rem;
            color: var(--gold);
            letter-spacing: 3px;
            font-style: italic;
            font-weight: 300;
            opacity: 0.9;
        }

        .divider {
            width: 80px; height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 20px auto;
        }

        .forever {
            font-family: 'Raleway', sans-serif;
            font-weight: 100;
            font-size: 0.65rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: var(--blush);
            opacity: 0.6;
        }

        .scroll-hint {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .scroll-hint span {
            font-family: 'Raleway', sans-serif;
            font-weight: 100;
            font-size: 0.55rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(201,169,110,0.4);
            animation: fadeUpDown 2.5s ease-in-out infinite;
        }

        .scroll-line {
            width: 1px; height: 40px;
            background: linear-gradient(to bottom, rgba(201,169,110,0.4), transparent);
            animation: fadeUpDown 2.5s ease-in-out infinite reverse;
        }

        .petal {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            animation: petalFall linear infinite;
        }

        @keyframes petalFall {
            0%   { opacity: 0; transform: translateY(-20px) rotate(0deg); }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.3; }
            100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>
    <canvas id="trail-canvas"></canvas>
    <canvas id="starfield"></canvas>
    <div id="unlock-flash"></div>

    <!-- LOCK SCREEN -->
    <div id="lock-screen">
        <div class="lock-bg"></div>
        <div class="lock-ring"></div>
        <div class="lock-ring"></div>

        <div class="lock-inner">
            <div class="lock-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>

            <div class="lock-hint">
                <div class="lock-eyebrow">enter to unlock</div>
                <div class="lock-chinese">我的生日</div>
                <div class="lock-subhint">hint · my birthday</div>
            </div>

            <div class="pin-dots">
                <div class="pin-dot" id="d0"></div>
                <div class="pin-dot" id="d1"></div>
                <div class="pin-dot" id="d2"></div>
                <div class="pin-dot" id="d3"></div>
            </div>

            <div class="lock-error" id="lock-error">incorrect</div>
            <div class="tap-hint" id="tap-hint">tap anywhere to type</div>
        </div>

        <input id="pin-input" type="tel" maxlength="4" autocomplete="off" inputmode="numeric"/>
    </div>

    <!-- MAIN SITE -->
    <div id="main-site">
        <section id="sec1">
            <div class="bg-layer"></div>
            <div class="content">
                <div class="flower-wrap">
                    <svg class="flower-svg" viewBox="0 0 100 120">
                        <defs>
                            <linearGradient id="tg1" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#ffb3c1"/>
                                <stop offset="100%" stop-color="#c9184a"/>
                            </linearGradient>
                            <linearGradient id="tg2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#ff4d6d"/>
                                <stop offset="100%" stop-color="#800e13"/>
                            </linearGradient>
                        </defs>
                        <path d="M50 95 Q18 88 8 52 Q8 18 38 28 Q28 62 50 95" fill="url(#tg1)" opacity="0.9"/>
                        <path d="M50 95 Q82 88 92 52 Q92 18 62 28 Q72 62 50 95" fill="url(#tg1)" opacity="0.9"/>
                        <path d="M50 98 Q33 88 28 52 Q28 8 50 3 Q72 8 72 52 Q67 88 50 98" fill="url(#tg2)"/>
                        <path d="M50 40 Q46 28 48 8" stroke="rgba(255,230,235,0.35)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                    </svg>
                    <div class="stem">
                        <div class="leaf leaf-l"></div>
                        <div class="leaf leaf-r"></div>
                    </div>
                </div>
                <div class="card" id="card1">
                    <div class="eyebrow">A gift for you</div>
                    <div class="headline">Until I can give it<br>to you in real</div>
                    <div class="subtitle">with every intention</div>
                </div>
            </div>
            <div class="scroll-hint">
                <span>scroll</span>
                <div class="scroll-line"></div>
            </div>
        </section>

        <section id="sec2">
            <div class="bg-layer"></div>
            <div class="content">
                <div class="flower-wrap" style="animation-delay:-3s;">
                    <svg class="flower-svg" viewBox="0 0 100 120">
                        <defs>
                            <radialGradient id="rg1" cx="50%" cy="50%" r="50%">
                                <stop offset="0%"   stop-color="#ff4d6d"/>
                                <stop offset="60%"  stop-color="#c9184a"/>
                                <stop offset="100%" stop-color="#800e13"/>
                            </radialGradient>
                            <radialGradient id="rg2" cx="40%" cy="40%" r="60%">
                                <stop offset="0%"   stop-color="#ffb3c1"/>
                                <stop offset="100%" stop-color="#ff4d6d"/>
                            </radialGradient>
                        </defs>
                        <ellipse cx="50" cy="50" rx="40" ry="42" fill="url(#rg1)" opacity="0.5"/>
                        <path d="M50 8 Q75 8 87 35 Q95 60 75 80 Q62 92 50 92 Q38 92 25 80 Q5 60 13 35 Q25 8 50 8" fill="#c9184a" opacity="0.7"/>
                        <path d="M50 18 Q68 18 78 40 Q84 60 66 74 Q58 82 50 82 Q42 82 34 74 Q16 60 22 40 Q32 18 50 18" fill="#ff4d6d" opacity="0.85"/>
                        <path d="M50 28 Q62 28 68 46 Q72 60 60 68 Q55 73 50 73 Q45 73 40 68 Q28 60 32 46 Q38 28 50 28" fill="url(#rg2)"/>
                        <path d="M50 42 C53 38 58 40 56 46 C54 52 47 52 46 47 C45 43 48 40 50 42" fill="#800e13" opacity="0.8"/>
                        <circle cx="43" cy="38" r="4" fill="rgba(255,230,235,0.15)"/>
                    </svg>
                    <div class="stem" style="height:180px;">
                        <div class="leaf leaf-l"></div>
                        <div class="leaf leaf-r"></div>
                    </div>
                </div>
                <div class="card" id="card2">
                    <div class="eyebrow">always &amp; truly</div>
                    <div class="headline">You make my life<br>worth living</div>
                    <div class="subtitle">and I mean every word</div>
                </div>
            </div>
        </section>

        <section id="sec3">
            <div class="bg-layer"></div>
            <div class="content">
                <div class="card" id="card3" style="max-width:640px; padding:56px 72px;">
                    <div class="eyebrow">with all of me</div>
                    <div class="name-display">Sajda</div>
                    <div class="divider"></div>
                    <div class="arabic-line">我爱你</div>
                    <div class="divider"></div>
                    <div class="forever">forever &nbsp;·&nbsp; always &nbsp;·&nbsp; without condition</div>
                </div>
            </div>
        </section>
    </div>

    <script>
    // ═══════════════════════════════════════
    //  CURSOR
    // ═══════════════════════════════════════
    const dot  = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let mx = window.innerWidth/2, my = window.innerHeight/2;
    let rx = mx, ry = my;

    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    document.addEventListener('touchmove', e => {
        mx = e.touches[0].clientX;
        my = e.touches[0].clientY;
    }, { passive: true });

    (function animCursor() {
        dot.style.left = mx + 'px';
        dot.style.top  = my + 'px';
        rx += (mx - rx) * 0.13;
        ry += (my - ry) * 0.13;
        ring.style.left = rx + 'px';
        ring.style.top  = ry + 'px';
        requestAnimationFrame(animCursor);
    })();

    // ═══════════════════════════════════════
    //  CURSOR TRAIL
    // ═══════════════════════════════════════
    const trailCanvas = document.getElementById('trail-canvas');
    const tctx = trailCanvas.getContext('2d');
    const trail = [];
    const TRAIL_LEN = 30;

    function resizeTrail() {
        trailCanvas.width  = window.innerWidth;
        trailCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeTrail);
    resizeTrail();

    document.addEventListener('mousemove', e => {
        trail.push({ x: e.clientX, y: e.clientY });
        if (trail.length > TRAIL_LEN) trail.shift();
    });

    (function drawTrail() {
        tctx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
        for (let i = 1; i < trail.length; i++) {
            const t = i / trail.length;
            const p    = trail[i];
            const prev = trail[i - 1];

            // Glowing line
            tctx.beginPath();
            tctx.moveTo(prev.x, prev.y);
            tctx.lineTo(p.x, p.y);
            tctx.strokeStyle = `rgba(201,169,110,${t * 0.28})`;
            tctx.lineWidth   = t * 3;
            tctx.lineCap     = 'round';
            tctx.stroke();

            // Blush orb every few points
            if (i % 4 === 0) {
                tctx.beginPath();
                tctx.arc(p.x, p.y, t * 2.5, 0, Math.PI * 2);
                tctx.fillStyle = `rgba(255,179,193,${t * 0.18})`;
                tctx.fill();
            }
        }
        requestAnimationFrame(drawTrail);
    })();

    // ═══════════════════════════════════════
    //  STARFIELD
    // ═══════════════════════════════════════
    const starCanvas = document.getElementById('starfield');
    const sctx = starCanvas.getContext('2d');

    function resizeStar() {
        starCanvas.width  = window.innerWidth;
        starCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeStar);
    resizeStar();

    const stars = Array.from({ length: 130 }, () => ({
        x: Math.random() * starCanvas.width,
        y: Math.random() * starCanvas.height,
        r: Math.random() * 1.2 + 0.2,
        speed: Math.random() * 0.003 + 0.001,
        phase: Math.random() * Math.PI * 2,
    }));

    (function drawStars(t) {
        sctx.clearRect(0, 0, starCanvas.width, starCanvas.height);
        stars.forEach(s => {
            const alpha = 0.15 + 0.5 * (0.5 + 0.5 * Math.sin((t || 0) * s.speed + s.phase));
            sctx.beginPath();
            sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            sctx.fillStyle = `rgba(201,169,110,${alpha})`;
            sctx.fill();
        });
        requestAnimationFrame(drawStars);
    })();

    // ═══════════════════════════════════════
    //  PASSWORD GATE
    // ═══════════════════════════════════════
    const PASSWORD    = '0918';
    const lockEl      = document.getElementById('lock-screen');
    const mainSite    = document.getElementById('main-site');
    const pinInput    = document.getElementById('pin-input');
    const pinDots     = [0,1,2,3].map(i => document.getElementById('d' + i));
    const errorMsg    = document.getElementById('lock-error');
    const flash       = document.getElementById('unlock-flash');
    const tapHint     = document.getElementById('tap-hint');

    let pinValue = '';
    let unlocked = false;

    function focusInput() {
        pinInput.focus();
        tapHint.style.opacity = '0';
        tapHint.style.transition = 'opacity 0.4s';
    }

    lockEl.addEventListener('click', focusInput);
    lockEl.addEventListener('touchend', focusInput);
    setTimeout(focusInput, 400);

    pinInput.addEventListener('input', () => {
        if (unlocked) return;
        const raw = pinInput.value.replace(/\D/g, '').slice(0, 4);
        pinInput.value = raw;
        pinValue = raw;

        pinDots.forEach((d, i) => {
            d.classList.remove('filled', 'error');
            if (i < raw.length) d.classList.add('filled');
        });

        errorMsg.classList.remove('show');

        if (raw.length === 4) {
            if (raw === PASSWORD) {
                triggerUnlock();
            } else {
                triggerError();
            }
        }
    });

    function triggerError() {
        pinDots.forEach(d => {
            d.classList.remove('filled');
            d.classList.add('error');
        });
        errorMsg.classList.add('show');
        pinInput.value = '';
        pinValue = '';
        setTimeout(() => {
            pinDots.forEach(d => d.classList.remove('error'));
            errorMsg.classList.remove('show');
        }, 950);
    }

    function triggerUnlock() {
        unlocked = true;

        // Pulse gold flash
        flash.classList.add('flash');
        setTimeout(() => flash.classList.remove('flash'), 600);

        // Lock screen fades & scales out
        setTimeout(() => lockEl.classList.add('unlocking'), 150);

        // Main site fades in
        setTimeout(() => {
            lockEl.style.display = 'none';
            mainSite.classList.add('revealed');
            initSite();
        }, 1500);
    }

    // ═══════════════════════════════════════
    //  SITE INIT
    // ═══════════════════════════════════════
    function initSite() {
        const cards = document.querySelectorAll('.card');
        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (e.isIntersecting) e.target.classList.add('visible');
            });
        }, { threshold: 0.3 });
        cards.forEach(c => obs.observe(c));
        setTimeout(() => document.getElementById('card1').classList.add('visible'), 350);

        // Petal rain
        const petalColors = ['#ffb3c1','#ff85a1','#ff4d6d','#c9184a','#f9c6d0'];
        function spawnPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            const size = Math.random() * 6 + 4;
            p.style.cssText = `
                left:${Math.random()*100}vw;top:-20px;
                width:${size}px;height:${size*1.4}px;
                background:${petalColors[Math.floor(Math.random()*petalColors.length)]};
                border-radius:50% 0 50% 0;
                animation-duration:${Math.random()*8+6}s;
                animation-delay:${Math.random()*2}s;
                opacity:0;filter:blur(${Math.random()*0.5}px);
            `;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 14000);
        }
        setInterval(spawnPetal, 600);
    }
    </script>
</body>
</html>
